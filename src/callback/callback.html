<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 처리 중...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #FFF8F3;
      font-family: -apple-system, sans-serif;
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 18px; font-weight: 800; color: #3F3A39; margin-bottom: 8px; }
    .sub   { font-size: 13px; color: #B89C97; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">✅</div>
    <div class="title">로그인 완료!</div>
    <div class="sub">잠시 후 자동으로 닫힙니다...</div>
  </div>
  <script>
    // 부모 창(메인 페이지)에 로그인 성공 신호 전송
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: "NAVER_LOGIN_SUCCESS" }, "*");
      setTimeout(function() { window.close(); }, 800);
    } else {
      // 팝업이 아니라 직접 접근한 경우 → 메인으로 이동
      window.location.href = "/";
    }
  </script>
</body>
</html>
